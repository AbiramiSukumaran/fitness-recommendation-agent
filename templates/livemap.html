<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Keynote Agent Traffic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        
        .overlay {
            position: absolute;
            top: 40px;
            left: 40px;
            z-index: 10;
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            min-width: 300px;
        }
        
        .counter {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
        }

        .text-gradient-pink {
            background: linear-gradient(to right, #ec4899, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-green {
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gm-style-iw { background-color: #111827 !important; color: white !important; }
        .gm-style-iw-d { overflow: hidden !important; }
        .gm-style-iw-tc::after { background: #111827 !important; }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .status-dot { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <div id="stats-overlay" class="overlay">
        <div class="flex justify-between items-start mb-4">
            <h1 class="text-gray-400 font-semibold tracking-widest uppercase text-xs">Live Agent Executions</h1>
            <div id="connection-status" class="w-3 h-3 bg-green-500 rounded-full status-dot ml-4 mt-0.5" title="Connected"></div>
        </div>
        
        <div class="flex gap-8 border-b border-gray-800 pb-4 mb-3">
            <div>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1"><i class="fa-solid fa-bolt text-pink-500 mr-1"></i> Total Hits</p>
                <div id="hit-counter" class="counter text-gradient-pink">0</div>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1"><i class="fa-solid fa-users text-green-500 mr-1"></i> Unique Users</p>
                <div id="unique-counter" class="counter text-gradient-green">0</div>
            </div>
        </div>

        <p class="text-gray-500 text-xs"><i class="fa-solid fa-location-dot"></i> Dynamic User Tracking</p>
    </div>

    <div id="map"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        let GOOGLE_MAPS_API_KEY = "{{ GOOGLE_MAPS_API_KEY }}";
        
        let FIREBASE_CONFIG = {};
        try {
            const configStr = `{{ FIREBASE_CONFIG | safe }}`;
            if (!configStr.includes('{' + '{') && configStr.trim() !== "") {
                FIREBASE_CONFIG = JSON.parse(configStr);
            }
        } catch (e) {
            console.error("Invalid FIREBASE_CONFIG format.", e);
        }

        let map;
        let totalHits = 0;
        
        // Use a JavaScript Set to automatically track unique names
        const uniqueNamesSet = new Set();
        
        let simulationInterval;
        const counterEl = document.getElementById('hit-counter');
        const uniqueCounterEl = document.getElementById('unique-counter');

        const darkMapStyle = [
            { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
            { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
            { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
            { featureType: "poi", elementType: "labels.text.fill", stylers: [{ visibility: "off" }] },
            { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
            { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
            { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
        ];

        function loadGoogleMaps() {
            return new Promise((resolve, reject) => {
                window.initMap = () => {
                    map = new google.maps.Map(document.getElementById("map"), {
                        center: { lat: 28.5356, lng: 77.0392 }, 
                        zoom: 17, 
                        styles: darkMapStyle,
                        disableDefaultUI: true,
                        tilt: 45
                    });
                    resolve();
                };

                if (GOOGLE_MAPS_API_KEY.includes('{' + '{')) {
                    console.warn("Google Maps API Key not injected by Flask. Starting simulation without map.");
                    document.getElementById('connection-status').classList.replace('bg-green-500', 'bg-blue-500');
                    document.getElementById('connection-status').title = "Simulation Mode (No Map)";
                    resolve(); 
                    return;
                }

                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
                script.async = true;
                script.defer = true;
                script.onerror = () => reject(new Error("Failed to load Google Maps script."));
                document.head.appendChild(script);
            });
        }

        window.dropPin = function(lat, lng, pinName) {
            if (!map) return;
            const marker = new google.maps.Marker({
                position: { lat: lat, lng: lng },
                map: map,
                title: pinName,
                animation: google.maps.Animation.DROP,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 8,
                    fillColor: "#ec4899",
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 2,
                }
            });
            setTimeout(() => { marker.setMap(null); }, 30000);
        };

        function startSimulation() {
            simulationInterval = setInterval(() => {
                const baseLat = 28.5356;
                const baseLng = 77.0392;
                const jitterLat = (Math.random() - 0.5) * 0.003;
                const jitterLng = (Math.random() - 0.5) * 0.003;
                
                totalHits++;
                counterEl.innerText = totalHits;
                
                // Simulate unique users
                if (Math.random() > 0.5) {
                    uniqueNamesSet.add("SIM" + Math.floor(Math.random() * 100));
                    uniqueCounterEl.innerText = uniqueNamesSet.size;
                }

                if(map) window.dropPin(baseLat + jitterLat, baseLng + jitterLng, "SIM");
            }, 600);
        }

        async function startDashboard() {
            try {
                await loadGoogleMaps();

                if (Object.keys(FIREBASE_CONFIG).length > 0) {
                    const app = initializeApp(FIREBASE_CONFIG);
                    const db = getFirestore(app);
                    
                    // Note: If you want to pull more historical data, adjust this limit!
                    const q = query(collection(db, "keynote_live_traffic"), orderBy("timestamp", "desc"), limit(2000));
                    
                    onSnapshot(q, (snapshot) => {
                        snapshot.docChanges().forEach((change) => {
                            if (change.type === "added") {
                                const data = change.doc.data();
                                if (data.lat && data.lng) {
                                    // 1. Increment Total Hits
                                    totalHits++;
                                    counterEl.innerText = totalHits;
                                    
                                    // 2. Track Unique Name (Default to ANO if missing)
                                    const userName = data.name || "ANO";
                                    uniqueNamesSet.add(userName);
                                    uniqueCounterEl.innerText = uniqueNamesSet.size;

                                    // 3. Drop the Pin
                                    setTimeout(() => { window.dropPin(data.lat, data.lng, userName); }, Math.random() * 400);
                                }
                            }
                        });
                    }, (error) => {
                        console.error("Firestore error:", error);
                        document.getElementById('connection-status').classList.replace('bg-green-500', 'bg-red-500');
                    });
                } else {
                    document.getElementById('connection-status').classList.replace('bg-green-500', 'bg-yellow-500');
                    document.getElementById('connection-status').title = "Missing Firebase Config - Running Simulation";
                    startSimulation();
                }

            } catch (e) {
                console.error("Dashboard Initialization failed: ", e);
            }
        }

        startDashboard();
    </script>
</body>
</html>
